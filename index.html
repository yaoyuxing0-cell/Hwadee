<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于知识图谱的健康知识库构建系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7f9;
        }
        h1 {
            text-align: center;
            color: #1f1f1f;
            margin-bottom: 20px;
        }
        
        /* 强拦截：全局认证中心全屏遮罩样式 */
        .global-auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #722ed1 0%, #1890ff 100%); 
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: #fff; padding: 35px; border-radius: 12px; width: 420px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); box-sizing: border-box;
        }
        .auth-toggle-link {
            color: #1890ff; cursor: pointer; font-size: 13px; text-decoration: underline;
        }

        /* 主业务页面内容样式 (默认隐藏 display: none) */
        #main-app-content { display: none; }

        /* 用户登录状态栏 */
        .user-auth-bar {
            width: 90%; margin: 0 auto 15px auto; text-align: right; font-size: 14px;
            background: #fff; padding: 12px 20px; border-radius: 6px;
            box-sizing: border-box; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        /* 搜索区域样式 */
        .search-section { 
            position: relative; width: 90%; margin: 0 auto 20px auto; text-align: center; 
        }
        #search-input { 
            width: 50%; padding: 12px; font-size: 16px; border: 1px solid #d9d9d9; border-radius: 4px 0 0 4px; outline: none;
        }
        #search-btn { 
            padding: 12px 24px; font-size: 16px; background: #40a9ff; color: #fff; border: none; border-radius: 0 4px 4px 0; cursor: pointer; 
        }
        #search-btn:hover { background: #096dd9; }
        #suggest-panel { 
            position: absolute; left: 20%; width: 50%; background: #fff; border: 1px solid #d9d9d9; border-top: none; text-align: left; z-index: 999; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .suggest-item { padding: 10px; cursor: pointer; }
        .suggest-item:hover { background-color: #e6f7ff; }
        .suggest-hidden { display: none; }

        /* 中间主布局区域 */
        .main-layout { display: flex; width: 90%; margin: 0 auto; gap: 20px; }
        #graph-container { 
            width: 70%; height: 580px; border: 1px solid #d9d9d9; background-color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-radius: 8px; 
        }
        #detail-panel { 
            width: 30%; background: #fff; border: 1px solid #d9d9d9; border-radius: 8px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        #detail-panel h3 { margin-top: 0; color: #0050b3; border-bottom: 2px solid #e8e8e8; padding-bottom: 10px; }
        #detail-content { line-height: 1.6; color: #595959; font-size: 14px; }

        /* 底部推荐区域 */
        .recommend-section { width: 90%; margin: 30px auto; }
        .recommend-section h3 { color: #262626; }
        .card-container { display: flex; gap: 20px; }
        .card { 
            flex: 1; background: #fff; padding: 15px; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #52c41a; cursor: pointer; transition: all 0.3s ease;
        }
        .card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.12); transform: translateY(-2px); background-color: #fafafa; }
        .card h4 { margin: 0 0 10px 0; color: #262626; }

        /* 统一输入框通用样式 */
        .modal-input {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #d9d9d9; border-radius: 4px; box-sizing: border-box; outline: none;
        }
        .modal-input:focus { border-color: #40a9ff; }
    </style>
</head>
<body>

    <div id="global-auth-center" class="global-auth-overlay">
        <div class="auth-card">
            <h2 id="auth-main-title" style="margin-top:0; color:#0050b3; text-align:center; margin-bottom:25px;">健康知识库·安全认证</h2>
            
            <div>
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:13px;">用户名/科研工号：</label>
                <input type="text" id="auth-username" class="modal-input" placeholder="请设置或输入用户名">
                
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:13px;">账户认证密码：</label>
                <input type="password" id="auth-password" class="modal-input" placeholder="请设置或输入密码">
            </div>

            <div id="register-profile-panel" style="display: none; border-top: 1px dashed #eee; margin-top: 10px; padding-top: 10px;">
                <label style="display:block; margin-bottom:5px; font-weight:bold; font-size:13px;">1. 选择您的服务对象身份类型：</label>
                <select id="role-select" class="modal-input" style="margin-bottom:15px;">
                    <option value="医疗从业者">医疗从业者 (医生/护士)</option>
                    <option value="科研人员">科研人员 (教授/学者)</option>
                    <option value="健康科普机构">健康科普机构 (媒体/专家团)</option>
                    <option value="普通用户">普通用户 (普通大众)</option>
                </select>

                <label style="display:block; margin-bottom:8px; font-weight:bold; font-size:13px;">2. 勾选感兴趣的医学偏好 (最多选3项)：</label>
                <div id="tags-container" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom:15px;">
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="心血管系统"> 心血管系统</label>
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="临床安全用药"> 临床安全用药</label>
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="罕见病筛查"> 罕见病筛查</label>
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="中医药现代化"> 中医药现代化</label>
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="神经内科指南"> 神经内科指南</label>
                    <label style="border:1px solid #d9d9d9; padding:4px 8px; border-radius:20px; cursor:pointer; font-size:12px;"><input type="checkbox" name="pref-tag" value="慢性病膳食调理"> 慢性病膳食调理</label>
                </div>
            </div>

            <div style="margin-top: 20px;">
                <button id="auth-action-btn" style="width:100%; padding: 11px; background: #40a9ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size:15px; font-weight:bold;">验证登录</button>
            </div>
            <div style="margin-top: 15px; text-align: center;">
                <span id="auth-state-toggle" class="auth-toggle-link">没有账号？立即注册新科研账户</span>
            </div>
        </div>
    </div>


    <div id="main-app-content">
        <div class="user-auth-bar">
            <div id="user-info-display">
                <span style="color:#52c41a; font-weight:bold;">👤 正在同步安全凭证...</span> 
            </div>
        </div>

        <h1>基于知识图谱的健康知识库构建系统</h1>
        
        <div class="search-section">
            <input type="text" id="search-input" placeholder="输入疾病、症状或药物，如：高血压" autocomplete="off">
            <button id="search-btn">搜索图谱</button>
            <div id="suggest-panel" class="suggest-hidden"></div>
        </div>

        <div class="main-layout">
            <div id="graph-container"></div>
            <div id="detail-panel">
                <h3>医学实体详情说明</h3>
                <div id="detail-content">请点击左侧图谱节点，系统将自动关联检索结构化医学知识...</div>
            </div>
        </div>

        <div class="recommend-section">
            <h3>🔬 专属科研文献与智能情报Feed流</h3>
            <div class="card-container" id="recommend-cards"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
