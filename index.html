<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于知识图谱的健康知识库构建系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7f9;
        }
        h1 {
            text-align: center;
            color: #1f1f1f;
            margin-bottom: 30px;
        }
        
        /* 搜索区域样式 */
        .search-section { 
            position: relative; 
            width: 90%; 
            margin: 0 auto 20px auto; 
            text-align: center; 
        }
        #search-input { 
            width: 50%; 
            padding: 12px; 
            font-size: 16px; 
            border: 1px solid #d9d9d9; 
            border-radius: 4px 0 0 4px; 
            outline: none;
        }
        #search-btn { 
            padding: 12px 24px; 
            font-size: 16px; 
            background: #40a9ff; 
            color: #fff; 
            border: none; 
            border-radius: 0 4px 4px 0; 
            cursor: pointer; 
        }
        #search-btn:hover { background: #096dd9; }
        #suggest-panel { 
            position: absolute; 
            left: 20%; 
            width: 50%; 
            background: #fff; 
            border: 1px solid #d9d9d9; 
            border-top: none; 
            text-align: left; 
            z-index: 999; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }
        .suggest-item { padding: 10px; cursor: pointer; }
        .suggest-item:hover { background-color: #e6f7ff; }
        .suggest-hidden { display: none; }

        /* 中间主布局区域（图谱 + 侧边栏） */
        .main-layout { 
            display: flex; 
            width: 90%; 
            margin: 0 auto; 
            gap: 20px; 
        }
        #graph-container { 
            width: 70%; 
            height: 580px; 
            border: 1px solid #d9d9d9; 
            background-color: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            border-radius: 8px; 
        }
        #detail-panel { 
            width: 30%; 
            background: #fff; 
            border: 1px solid #d9d9d9; 
            border-radius: 8px; 
            padding: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            box-sizing: border-box;
        }
        #detail-panel h3 { margin-top: 0; color: #0050b3; border-bottom: 2px solid #e8e8e8; padding-bottom: 10px; }
        #detail-content { line-height: 1.6; color: #595959; font-size: 14px; }

        /* 底部个性化推荐区域 */
        .recommend-section { width: 90%; margin: 30px auto; }
        .recommend-section h3 { color: #262626; }
        .card-container { display: flex; gap: 20px; }
        .card { 
            flex: 1; 
            background: #fff; 
            padding: 15px; 
            border-radius: 6px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); 
            border-left: 4px solid #40a9ff; 
            cursor: pointer; /* 关键：鼠标放上去变成“小手”形状 */
            transition: all 0.3s ease; /* 增加平滑过渡动画 */
            }
    .card:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.12); /* 鼠标悬浮时阴影加深 */
            transform: translateY(-2px); /* 卡片轻轻往上浮动2像素 */
            background-color: #fafafa;
        }
        .card h4 { margin: 0 0 10px 0; color: #262626; }
    </style>
</head>
<body>

    <h1>健康知识库构建系统 (8节点/8关系 完整演练版)</h1>
    
    <div class="search-section">
        <input type="text" id="search-input" placeholder="输入疾病、症状或药物，如：高血压" autocomplete="off">
        <button id="search-btn">搜索图谱</button>
        <div id="suggest-panel" class="suggest-hidden"></div>
    </div>

    <div class="main-layout">
        <div id="graph-container"></div>
        <div id="detail-panel">
            <h3>医学实体详情说明</h3>
            <div id="detail-content">请点击左侧图谱节点，系统将自动关联检索结构化医学知识...</div>
        </div>
    </div>

    <div class="recommend-section">
        <h3>💡 为您智能推荐的健康科普与科研文献</h3>
        <div class="card-container" id="recommend-cards"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
